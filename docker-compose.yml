# PocketRisu-dedicated compose stack. Names are split from the historical
# 'risuai-nodeonly' identifiers so this container/volume pair never collides
# with any pre-existing risuai-nodeonly deployment.
name: pocketrisu

services:
  pocketrisu:
    container_name: pocketrisu
    image: ghcr.io/pocketrisu-alter/pocketrisu-alter:latest
    restart: always
    ports:
      # Host 7860 -> container 6001. The app listens on 6001 internally;
      # 7860 is a common external port for local AI frontends.
      - 7860:6001
      # Keep the original port as well if you want both available locally:
      # - 6001:6001
    volumes:
      - pocketrisu-save:/app/save

volumes:
  pocketrisu-save:
    # Dedicated volume name so it never shares data with risuai-nodeonly.
    name: pocketrisu_save
